kind = "mobile"
previewPath = "/"
title = "CampusDrop"
version = "1.0.0"
id = "artifacts/campusdrop"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 19416

[services.development]
run = "pnpm --filter campusdrop run dev"

[services.production]
build = [ "pnpm", "--filter", "campusdrop", "run", "build" ]
run = [ "pnpm", "--filter", "campusdrop", "run", "serve" ]

[services.env]
PORT = "19416"
BASE_PATH = "/"
